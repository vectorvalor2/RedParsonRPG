<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>REDPARSON Safe Sim (Demo)</title>
  <style>
    html, body { margin:0; height:100%; background:#0c0c10; color:#e8e6e3; font:14px/1.4 system-ui, sans-serif; }
    #hud { position:fixed; top:12px; left:12px; background:#16161a; border:1px solid #2a2a33; padding:10px 12px; border-radius:8px; }
    #hud .ok { color:#00d084; } #hud .warn { color:#ffd166; } #hud .bad { color:#ff5a5f; }
    #viewport { width:100%; height:100%; overflow:hidden; }
    .golden-guides { position:fixed; inset:0; pointer-events:none; }
  </style>
</head>
<body>
  <div id="viewport"></div>
  <canvas id="guides" class="golden-guides"></canvas>
  <div id="hud">
    <div><strong>FPS:</strong> <span id="fps">0</span></div>
    <div><strong>Confidence:</strong> <span id="conf">0.00</span></div>
    <div><strong>Risk Gate:</strong> <span id="gate" class="ok">open</span></div>
  </div>
  <script type="module" src="[unpkg.com](https://unpkg.com/three@0.161.0/build/three.module.js)"></script>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
